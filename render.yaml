# Render Blueprint — deploys PartyPlay as a persistent Node web service
# with WebSocket (Socket.IO) support. Render injects PORT automatically.
services:
  - type: web
    name: partyplay
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
